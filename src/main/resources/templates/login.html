<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng nhập - WebBanDoAn</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/css/auth.css}"/>
</head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<main class="main-content">
    <div class="container auth-container">
        <div class="auth-box auth-box-lg" role="region" aria-labelledby="auth-title">
            <h1 id="auth-title" class="auth-title">Đăng nhập</h1>

            <div id="auth-toast" class="auth-toast" th:if="${errorMessage != null or successMessage != null}" th:classappend="${errorMessage != null} ? ' error' : ' success'" role="alert" aria-live="assertive">
                <span th:if="${errorMessage != null}" th:text="${errorMessage}">Sai tên đăng nhập hoặc mật khẩu.</span>
                <span th:if="${successMessage != null}" th:text="${successMessage}">Đăng ký thành công.</span>
                <button type="button" class="toast-close" aria-label="Đóng" onclick="document.getElementById('auth-toast').style.display='none'">×</button>
            </div>

            <form th:action="@{/login}" method="post" class="auth-form" novalidate>

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>

                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" name="username" required autofocus
                           placeholder="Nhập tên đăng nhập" class="form-control form-control-lg"/>
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" required
                           placeholder="Nhập mật khẩu" class="form-control form-control-lg"/>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg">Đăng nhập</button>
            </form>

            <p class="auth-footer">
                Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a>
            </p>
        </div>
    </div>

    <script>
        // Auto-hide toast after 4s
        (function(){
            const toast = document.getElementById('auth-toast');
            if(!toast) return;
            setTimeout(()=>{
                toast.style.transition = 'opacity 360ms ease';
                toast.style.opacity = '0';
                setTimeout(()=> toast.style.display = 'none', 380);
            }, 4000);
        })();
    </script>
</main>

<!-- <div th:replace="~{layout/footer :: footer}"></div> -->

</body>
</html>
