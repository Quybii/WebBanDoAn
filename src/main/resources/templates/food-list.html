<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Danh sách món ăn - WebBanDoAn</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/css/food.css}"/>
</head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<main class="main-content">
    <div class="container">
        <h1 class="page-title">Danh sách món ăn</h1>

        <!-- Form tìm kiếm và lọc -->
        <div class="filter-section">
            <form th:action="@{/foods}" method="get" class="filter-form">
                <div class="filter-row">
                    <!-- Dropdown lọc danh mục -->
                    <select name="categoryId" class="filter-select">
                        <option value="">Tất cả danh mục</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}"
                                th:selected="${selectedCategoryId != null and selectedCategoryId == cat.id}">
                            Danh mục
                        </option>
                    </select>

                    <!-- Ô tìm kiếm -->
                    <input type="text"
                           name="keyword"
                           th:value="${keyword}"
                           placeholder="Tìm kiếm theo tên món..."
                           class="filter-input"/>

                    <!-- Nút tìm kiếm -->
                    <button type="submit" class="btn btn-primary">Tìm kiếm</button>

                    <!-- Nút xóa bộ lọc -->
                    <a th:href="@{/foods}" class="btn btn-secondary">Xóa bộ lọc</a>
                </div>
            </form>
        </div>

        <!-- Thông báo kết quả -->
        <div class="result-info" th:if="${totalElements > 0}">
            <p>Tìm thấy <strong th:text="${totalElements}">0</strong> món</p>
        </div>
        <div class="result-info" th:if="${totalElements == 0}">
            <p class="empty-msg">Không tìm thấy món nào.</p>
        </div>

        <!-- Danh sách món -->
        <div class="food-grid" th:if="${foods != null and !foods.isEmpty()}">
            <div th:each="food : ${foods}" class="food-card">
                <a th:href="@{/foods/{id}(id=${food.id})}" class="food-card-link">
                    <div class="food-card-image">
                        <img th:if="${food.imageUrl != null and !food.imageUrl.isEmpty()}"
                             th:src="${food.imageUrl}" th:alt="${food.name}"/>
                        <div th:if="${food.imageUrl == null or food.imageUrl.isEmpty()}" class="food-card-placeholder">
                            <span>🍽</span>
                        </div>
                    </div>
                    <div class="food-card-body">
                        <h3 class="food-card-title" th:text="${food.name}">Tên món</h3>
                        <p class="food-card-desc" th:text="${food.description != null ? #strings.abbreviate(food.description, 60) : '(Chưa có mô tả)'}">Mô tả</p>
                        <p class="food-card-category" th:text="'Danh mục: ' + ${food.category.name}">Danh mục</p>
                        <p class="food-card-price" th:text="${#numbers.formatDecimal(food.price, 1, 'COMMA', 0, 'POINT') + ' ₫'}">35.000 ₫</p>
                    </div>
                </a>
                <a th:href="@{/foods/{id}(id=${food.id})}" class="btn btn-add-cart">Xem chi tiết</a>
            </div>
        </div>

        <!-- Phân trang -->
        <div class="pagination" th:if="${totalPages > 1}">
            <!-- Nút Previous -->
            <a th:if="${currentPage > 0}"
               th:href="@{/foods(categoryId=${selectedCategoryId}, keyword=${keyword}, page=${currentPage - 1})}"
               class="pagination-btn">« Trước</a>
            <span th:if="${currentPage == 0}" class="pagination-btn disabled">« Trước</span>

            <!-- Số trang -->
            <span class="pagination-info">
                Trang <strong th:text="${currentPage + 1}">1</strong> / <strong th:text="${totalPages}">1</strong>
            </span>

            <!-- Nút Next -->
            <a th:if="${currentPage < totalPages - 1}"
               th:href="@{/foods(categoryId=${selectedCategoryId}, keyword=${keyword}, page=${currentPage + 1})}"
               class="pagination-btn">Sau »</a>
            <span th:if="${currentPage >= totalPages - 1}" class="pagination-btn disabled">Sau »</span>
        </div>
    </div>
</main>

<div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
