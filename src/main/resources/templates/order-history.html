<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Lịch sử đơn hàng - WebBanDoAn</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/css/cart.css}"/>
</head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<main class="main-content">
    <div class="container">
        <h1 class="page-title">Lịch sử đơn hàng</h1>

        <div th:if="${orders != null and !orders.isEmpty()}" class="order-list">
            <div th:each="order : ${orders}" class="order-card">
                <div class="order-card-header">
                    <div class="order-card-info">
                        <h3 class="order-card-id">Đơn hàng #<span th:text="${order.id}">1</span></h3>
                        <p class="order-card-date" th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}">01/01/2025 10:00</p>
                    </div>
                    <div class="order-card-status">
                        <span class="status-badge" th:classappend="${order.status == 'PENDING' ? 'status-pending' : (order.status == 'CONFIRMED' ? 'status-confirmed' : (order.status == 'DELIVERING' ? 'status-delivering' : (order.status == 'COMPLETED' ? 'status-completed' : 'status-cancelled')))}"
                              th:text="${order.status == 'PENDING' ? 'Chờ xác nhận' : (order.status == 'CONFIRMED' ? 'Đã xác nhận' : (order.status == 'DELIVERING' ? 'Đang giao' : (order.status == 'COMPLETED' ? 'Hoàn thành' : 'Đã hủy')))}">
                            Chờ xác nhận
                        </span>
                    </div>
                </div>
                <div class="order-card-body">
                    <p class="order-card-total">
                        <strong>Tổng tiền:</strong>
                        <span th:text="${#numbers.formatDecimal(order.totalAmount, 1, 'COMMA', 0, 'POINT') + ' ₫'}">0 ₫</span>
                    </p>
                    <p class="order-card-payment" th:if="${order.paymentMethod != null and order.paymentMethod.code == 'MOMO'}">
                        <strong>MoMo:</strong>
                        <span class="status-badge"
                              th:classappend="${order.paymentStatus == 'COMPLETED' ? 'status-completed' : (order.paymentStatus == 'FAILED' ? 'status-cancelled' : 'status-pending')}"
                              th:text="${order.paymentStatus == 'COMPLETED' ? 'Đã thanh toán' : (order.paymentStatus == 'FAILED' ? 'Chưa thanh toán / Hủy' : 'Đang chờ thanh toán')}">
                            Đang chờ thanh toán
                        </span>
                    </p>
                    <p class="order-card-address" th:text="'Địa chỉ: ' + ${order.shippingAddress}">Địa chỉ</p>
                    <p class="order-card-phone" th:text="'SĐT: ' + ${order.phone}">SĐT</p>
                </div>
                <div class="order-card-footer">
                    <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-primary">Xem chi tiết</a>
                    <a th:if="${order.status == 'COMPLETED'}"
                       th:href="@{/orders/{id}(id=${order.id})}"
                       class="btn btn-secondary">Đánh giá sản phẩm</a>
                </div>
            </div>
        </div>

        <div th:if="${orders == null or orders.isEmpty()}" class="order-empty">
            <p>Bạn chưa có đơn hàng nào.</p>
            <a th:href="@{/foods}" class="btn btn-primary">Xem danh sách món</a>
        </div>
    </div>
</main>

<div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
