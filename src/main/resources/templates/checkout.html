<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Thanh toán - WebBanDoAn</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/css/cart.css}"/>
    <link rel="stylesheet" th:href="@{/css/auth.css}"/>
</head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<main class="main-content">
    <div class="container">
        <h1 class="page-title">Thanh toán đơn hàng</h1>

        <p th:if="${errorMessage}" class="cart-message" style="background:#f8d7da;color:#721c24;" th:text="${errorMessage}">Lỗi.</p>

        <div class="checkout-layout">
            <div class="checkout-form-section">
                <h2>Thông tin giao hàng</h2>
                <form th:action="@{/checkout}" method="post" class="auth-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="form-group">
                        <label for="shippingAddress">Địa chỉ giao hàng <span class="required">*</span></label>
                        <input type="text" id="shippingAddress" name="shippingAddress" required
                               placeholder="Số nhà, đường, phường/xã, quận/huyện"
                               class="form-control" th:value="${user != null ? user.address : ''}"/>
                    </div>
                    <div class="form-group">
                        <label for="phone">Số điện thoại <span class="required">*</span></label>
                        <input type="text" id="phone" name="phone" required placeholder="Số điện thoại nhận hàng"
                               class="form-control" th:value="${user != null ? user.phone : ''}"/>
                    </div>
                    <div class="form-group">
                        <label for="note">Ghi chú</label>
                        <input type="text" id="note" name="note" placeholder="Ghi chú cho đơn hàng (không bắt buộc)"
                               class="form-control"/>
                    </div>
                    
                    <div class="form-group">
                        <label>Phương thức thanh toán <span class="required">*</span></label>
                        <div class="payment-methods">
                            <div th:each="pm : ${paymentMethods}" class="payment-method-option">
                                <input type="radio" th:id="'pm_' + ${pm.id}" 
                                       name="paymentMethodId" th:value="${pm.id}"
                                       th:checked="${pm.code == 'COD'}" required/>
                                <label th:for="'pm_' + ${pm.id}" class="payment-label">
                                    <span class="payment-name" th:text="${pm.name}">Thanh toán khi nhận hàng</span>
                                    <span class="payment-desc" th:text="${pm.description}">Mô tả</span>
                                </label>
                            </div>
                        </div>
                        <p class="payment-hint">
                            Chọn MoMo để chuyển sang cổng thanh toán thử nghiệm sau khi xác nhận đặt hàng.
                        </p>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-block">Xác nhận đặt hàng</button>
                </form>
            </div>

            <div class="checkout-summary">
                <h2>Đơn hàng của bạn</h2>
                <ul class="checkout-items">
                    <li th:each="item : ${cartItems}" class="checkout-item">
                        <span class="checkout-item-name" th:text="${item.food.name}">Món</span>
                        <span class="checkout-item-qty" th:text="${item.quantity + ' x ' + #numbers.formatDecimal(item.food.price, 1, 'COMMA', 0, 'POINT') + ' ₫'}">1 x 35.000 ₫</span>
                    </li>
                </ul>
                <p class="checkout-total">
                    <strong>Tổng cộng:</strong>
                    <span th:text="${#numbers.formatDecimal(totalAmount, 1, 'COMMA', 0, 'POINT') + ' ₫'}">0 ₫</span>
                </p>
            </div>
        </div>

        <p class="checkout-back">
            <a th:href="@{/cart}" class="btn btn-secondary">Quay lại giỏ hàng</a>
        </p>
    </div>
</main>

<div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
