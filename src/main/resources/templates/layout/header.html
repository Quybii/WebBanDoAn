<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Header</title></head>
<body>
<!-- Fragment: thanh header dùng chung cho mọi trang -->
<header class="site-header" th:fragment="header">
    <div class="container header-inner">
        <a th:href="@{/}" class="logo">WebBanDoAn</a>
        <nav class="main-nav">
            <a th:href="@{/}">Trang chủ</a>
            <a th:href="@{/foods}">Danh sách món</a>
            <a th:href="@{/cart}" class="nav-cart">Giỏ hàng</a>
            <span th:if="${isAuthenticated}" class="nav-user">
                <span class="nav-username" th:text="'Xin chào, ' + ${currentUsername}">Xin chào</span>
                <form th:action="@{/logout}" method="post" class="nav-logout-form"
                      th:with="csrfToken=${#request.getAttribute('org.springframework.security.web.csrf.CsrfToken')}">
                    <input type="hidden" th:name="${csrfToken.parameterName}" th:value="${csrfToken.token}"/>
                    <button type="submit" class="nav-logout-btn">Đăng xuất</button>
                </form>
            </span>
            <a th:if="${!isAuthenticated}" th:href="@{/login}">Đăng nhập</a>
        </nav>
    </div>
</header>
</body>
</html>
