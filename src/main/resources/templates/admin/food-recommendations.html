<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý món kèm theo - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/admin.css}" />
</head>
<body>
    <div th:replace="~{layout/admin-header :: admin-header}"></div>

    <main class="admin-main">
        <div class="container">

            <div class="admin-page-header">
                <h1 class="admin-page-title">Quản lý món kèm theo</h1>
                <button type="button" class="btn btn-primary" onclick="openRecommendationModal()">Thêm món kèm</button>
            </div>

            <p th:if="${successMessage}" class="admin-message success" th:text="${successMessage}"></p>
            <p th:if="${errorMessage}" class="admin-message error" th:text="${errorMessage}"></p>

            <div class="admin-table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th class="col-id">ID</th>
                            <th class="col-name">Món chính</th>
                            <th class="col-name">Món kèm theo</th>
                            <th class="col-price">Ưu tiên</th>
                            <th class="admin-actions-cell">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="rec : ${foodRecommendations}">
                            <td class="col-id" th:text="${rec.id}">1</td>
                            <td class="col-name" th:text="${rec.food != null ? rec.food.name : '-'}">Món chính</td>
                            <td class="col-name" th:text="${rec.recommendedFood != null ? rec.recommendedFood.name : '-'}">Món kèm</td>
                            <td class="col-price" th:text="${rec.priority}">1</td>
                            <td class="admin-actions-cell">
                                <button type="button" class="btn btn-small"
                                        th:data-id="${rec.id}"
                                        th:data-foodid="${rec.food != null ? rec.food.id : ''}"
                                        th:data-recommendedfoodid="${rec.recommendedFood != null ? rec.recommendedFood.id : ''}"
                                        th:data-priority="${rec.priority}"
                                        onclick="openRecommendationModal(this)">Sửa</button>
                                <form th:action="@{/admin/food-recommendations/{id}/delete(id=${rec.id})}" method="post" class="admin-inline-form">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="btn btn-small btn-danger" onclick="return confirm('Xóa gợi ý này?')">Xóa</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="admin-pagination" th:if="${totalPages > 1}">
                <a th:if="${currentPage > 0}"
                   th:href="@{/admin/food-recommendations(page=${currentPage - 1}, size=10)}"
                   class="pagination-btn">« Trước</a>
                <span th:if="${currentPage == 0}" class="pagination-btn disabled">« Trước</span>

                <span class="pagination-info">
                    Trang <strong th:text="${currentPage + 1}">1</strong> / <strong th:text="${totalPages}">1</strong>
                </span>

                <a th:if="${currentPage < totalPages - 1}"
                   th:href="@{/admin/food-recommendations(page=${currentPage + 1}, size=10)}"
                   class="pagination-btn">Sau »</a>
                <span th:if="${currentPage >= totalPages - 1}" class="pagination-btn disabled">Sau »</span>
            </div>
        </div>
    </main>

    <div id="recommendationModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="recommendationModalTitle">Thêm món kèm theo</h2>
                <span class="close-btn" onclick="closeRecommendationModal()">&times;</span>
            </div>

            <form th:action="@{/admin/food-recommendations/save}" method="post" class="admin-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" id="recommendationId" name="id" />

                <div class="form-row">
                    <div class="form-group">
                        <label for="recommendationFoodId">Món chính <span class="required">*</span></label>
                        <select id="recommendationFoodId" name="foodId" required class="form-control">
                            <option value="">-- Chọn món chính --</option>
                            <option th:each="food : ${foods}"
                                    th:if="${!food.isAddon}"
                                    th:value="${food.id}"
                                    th:text="${food.name}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="recommendedFoodId">Món kèm theo <span class="required">*</span></label>
                        <select id="recommendedFoodId" name="recommendedFoodId" required class="form-control">
                            <option value="">-- Chọn món kèm theo --</option>
                            <option th:each="food : ${foods}"
                                    th:if="${food.isAddon}"
                                    th:value="${food.id}"
                                    th:text="${food.name}"></option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="recommendationPriority">Ưu tiên hiển thị</label>
                    <input type="number" id="recommendationPriority" name="priority" min="1" value="1" class="form-control" />
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeRecommendationModal()">Hủy</button>
                    <button type="submit" class="btn btn-primary">Lưu gợi ý</button>
                </div>
            </form>
        </div>
    </div>

    <div th:replace="~{layout/footer :: footer}"></div>

    <script>
        const recommendationModal = document.getElementById('recommendationModal');
        const recommendationForm = recommendationModal.querySelector('form');
        const recommendationModalTitle = document.getElementById('recommendationModalTitle');

        function openRecommendationModal(btn = null) {
            if (btn) {
                recommendationModalTitle.innerText = "Chỉnh sửa món kèm";
                document.getElementById('recommendationId').value = btn.getAttribute('data-id');
                document.getElementById('recommendationFoodId').value = btn.getAttribute('data-foodid');
                document.getElementById('recommendedFoodId').value = btn.getAttribute('data-recommendedfoodid');
                document.getElementById('recommendationPriority').value = btn.getAttribute('data-priority') || 1;
            } else {
                recommendationModalTitle.innerText = "Thêm món kèm theo";
                recommendationForm.reset();
                document.getElementById('recommendationId').value = "";
                document.getElementById('recommendationPriority').value = 1;
            }
            recommendationModal.classList.add('active');
        }

        function closeRecommendationModal() {
            recommendationModal.classList.remove('active');
        }

        window.addEventListener('click', function (event) {
            if (event.target === recommendationModal) closeRecommendationModal();
        });
    </script>
</body>
</html>
