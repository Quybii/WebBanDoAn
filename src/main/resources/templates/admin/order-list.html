<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Quản lý đơn hàng - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>
<div th:replace="~{layout/admin-header :: admin-header}"></div>

<main class="admin-main">
    <div class="container">
        <h1 class="admin-page-title">Quản lý đơn hàng</h1>

        <p th:if="${successMessage}" class="admin-message success" th:text="${successMessage}">Thành công.</p>
        <p th:if="${errorMessage}" class="admin-message error" th:text="${errorMessage}">Lỗi.</p>

        <div class="admin-table-container">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Ngày đặt</th>
                        <th>Khách hàng</th>
                        <th>Tổng tiền</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders}">
                        <td th:text="${order.id}">1</td>
                        <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}">01/01/2025 10:00</td>
                        <td th:text="${order.user.username}">user1</td>
                        <td th:text="${#numbers.formatDecimal(order.totalAmount, 1, 'COMMA', 0, 'POINT') + ' ₫'}">0 ₫</td>
                        <td>
                            <span class="status-badge"
                                  th:classappend="${order.status == 'PENDING' ? 'status-pending' : (order.status == 'CONFIRMED' ? 'status-confirmed' : (order.status == 'DELIVERING' ? 'status-delivering' : (order.status == 'COMPLETED' ? 'status-completed' : 'status-cancelled')))}"
                                  th:text="${order.status == 'PENDING' ? 'Chờ xác nhận' : (order.status == 'CONFIRMED' ? 'Đã xác nhận' : (order.status == 'DELIVERING' ? 'Đang giao' : (order.status == 'COMPLETED' ? 'Hoàn thành' : 'Đã hủy')))}">
                                Chờ xác nhận
                            </span>
                        </td>
                        <td class="admin-actions-cell">
                            <a th:href="@{/admin/orders/{id}(id=${order.id})}" class="btn btn-small">Xem chi tiết</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="admin-pagination" th:if="${totalPages > 1}">
            <a th:if="${currentPage > 0}"
               th:href="@{/admin/orders(page=${currentPage - 1}, size=10)}"
               class="pagination-btn">« Trước</a>
            <span th:if="${currentPage == 0}" class="pagination-btn disabled">« Trước</span>

            <span class="pagination-info">
                Trang <strong th:text="${currentPage + 1}">1</strong> / <strong th:text="${totalPages}">1</strong>
            </span>

            <a th:if="${currentPage < totalPages - 1}"
               th:href="@{/admin/orders(page=${currentPage + 1}, size=10)}"
               class="pagination-btn">Sau »</a>
            <span th:if="${currentPage >= totalPages - 1}" class="pagination-btn disabled">Sau »</span>
        </div>
    </div>
</main>

<div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
