# =====================================================
# WebBanDoAn - Cấu hình ứng dụng
# =====================================================

# --- Server ---
server.port=8080
server.servlet.context-path=/

# --- SQL Server ---
# ⚠️ LƯU Ý: Thông tin credentials không nên để ở đây!
# Mỗi thành viên vui lòng tạo file "application-local.properties"
# và điền thông tin SQL Server của mình. File này sẽ được gitignore tự động
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=WebBanDoAn;encrypt=true;trustServerCertificate=true
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# --- Active Profile ---
spring.profiles.active=local

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# --- Thymeleaf ---
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# --- Upload file (ảnh món, ảnh danh mục) - tùy chọn ---
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# --- Logging ---
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

