<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng ký - WebBanDoAn</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/css/auth.css}"/>
</head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<main class="main-content">
    <div class="container auth-container">
        <div class="auth-box">
            <h1 class="auth-title">Đăng ký tài khoản</h1>

            <p th:if="${errorMessage}" class="auth-error" th:text="${errorMessage}">Lỗi đăng ký.</p>

            <form th:action="@{/register}" method="post" class="auth-form"
                  th:with="csrfToken=${#request.getAttribute('org.springframework.security.web.csrf.CsrfToken')}">
                <input type="hidden" th:name="${csrfToken.parameterName}" th:value="${csrfToken.token}"/>
                <div class="form-group">
                    <label for="username">Tên đăng nhập <span class="required">*</span></label>
                    <input type="text" id="username" name="username" required
                           placeholder="Tên đăng nhập" class="form-control" th:value="${username}"/>
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu <span class="required">*</span></label>
                    <input type="password" id="password" name="password" required minlength="4"
                           placeholder="Ít nhất 4 ký tự" class="form-control"/>
                </div>
                <div class="form-group">
                    <label for="fullName">Họ tên</label>
                    <input type="text" id="fullName" name="fullName"
                           placeholder="Họ và tên" class="form-control"/>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email"
                           placeholder="email@example.com" class="form-control"/>
                </div>
                <div class="form-group">
                    <label for="phone">Số điện thoại</label>
                    <input type="text" id="phone" name="phone"
                           placeholder="Số điện thoại" class="form-control"/>
                </div>
                <div class="form-group">
                    <label for="address">Địa chỉ</label>
                    <input type="text" id="address" name="address"
                           placeholder="Địa chỉ giao hàng" class="form-control"/>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Đăng ký</button>
            </form>

            <p class="auth-footer">
                Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a>
            </p>
        </div>
    </div>
</main>

<div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
