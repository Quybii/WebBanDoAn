<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${food.id != null ? 'Sửa món ăn' : 'Thêm món mới'} + ' - Admin'">Form món - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
    <link rel="stylesheet" th:href="@{/css/auth.css}"/>
</head>
<body>
<div th:replace="~{layout/admin-header :: admin-header}"></div>

<main class="admin-main">
    <div class="container">
        <h1 class="admin-page-title" th:text="${food.id != null ? 'Sửa món ăn' : 'Thêm món mới'}">Form món</h1>

        <p th:if="${errorMessage}" class="admin-message error" th:text="${errorMessage}">Lỗi.</p>

        <div class="admin-form-container">
                        <form th:action="@{/admin/foods}" method="post" class="auth-form"
                                    th:object="${food}" enctype="multipart/form-data">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" th:field="*{id}"/>

                <div class="form-group">
                    <label for="name">Tên món <span class="required">*</span></label>
                    <input type="text" id="name" th:field="*{name}" required class="form-control"/>
                </div>

                <div class="form-group">
                    <label for="description">Mô tả</label>
                    <textarea id="description" th:field="*{description}" rows="4" class="form-control"></textarea>
                </div>

                <div class="form-group">
                    <label for="price">Giá (₫) <span class="required">*</span></label>
                    <input type="number" id="price" th:field="*{price}" step="0.01" min="0" required class="form-control"/>
                </div>

                <div class="form-group">
                    <label for="categoryId">Danh mục <span class="required">*</span></label>
                    <select id="categoryId" name="categoryId" required class="form-control">
                        <option value="">Chọn danh mục</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}"
                                th:selected="${food.category != null and food.category.id == cat.id}">
                            Danh mục
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="imageUrl">URL ảnh</label>
                    <input type="text" id="imageUrl" th:field="*{imageUrl}" class="form-control" placeholder="https://..."/>
                </div>

                <div class="form-group">
                    <label for="images">Tải lên ảnh (có thể chọn nhiều)</label>
                    <input type="file" id="images" name="images" multiple accept="image/*" class="form-control" />
                </div>

                <div th:if="${images != null}">
                    <label>Ảnh hiện có</label>
                    <div class="admin-image-list">
                        <div th:each="img : ${images}" class="admin-image-item">
                            <img th:src="${img.imageUrl}" alt="img" style="max-width:120px;max-height:120px;display:block;"/>
                            <div>
                                <form th:action="@{/admin/foods/images/{imageId}/set-main(imageId=${img.id})}" method="post" style="display:inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm" th:disabled="${img.isMain}">Đặt làm ảnh chính</button>
                                </form>
                                <form th:action="@{/admin/foods/images/{imageId}/delete(imageId=${img.id})}" method="post" style="display:inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-danger">Xóa</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" th:field="*{isAvailable}"/>
                        Đang bán
                    </label>
                </div>

                <div class="form-group">
                    <button type="submit" class="btn btn-primary btn-block">Lưu</button>
                    <a th:href="@{/admin/foods}" class="btn btn-secondary btn-block">Hủy</a>
                </div>
            </form>
        </div>
    </div>
</main>

<div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
