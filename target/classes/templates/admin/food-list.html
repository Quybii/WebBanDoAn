<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý món ăn - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/admin.css}" />
</head>

<body>
    <div th:replace="~{layout/admin-header :: admin-header}"></div>

    <main class="admin-main">
        <div class="container">

            <div class="admin-page-header">
                <h1 class="admin-page-title">Quản lý món ăn</h1>
                <button type="button" class="btn btn-primary" onclick="openFoodModal()">Thêm món mới</button>
            </div>

            <p th:if="${successMessage}" class="admin-message success" th:text="${successMessage}"></p>
            <p th:if="${errorMessage}" class="admin-message error" th:text="${errorMessage}"></p>

            <div class="admin-table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th class="col-id">ID</th>
                            <th class="col-name">Tên món</th>
                            <th class="col-category">Danh mục</th>
                            <th class="col-price">Giá</th>
                            <th class="admin-img-cell">Hình ảnh</th>
                            <th class="col-status">Trạng thái</th>
                            <th class="admin-actions-cell">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="food : ${foods}">
                            <td class="col-id" th:text="${food.id}">1</td>
                            <td class="col-name" th:text="${food.name}">Tên món</td>
                            <td class="col-category"
                                th:text="${food.category != null ? food.category.name : 'Chưa gắn danh mục'}">Danh mục</td>
                            <td class="col-price"
                                th:text="${#numbers.formatDecimal(food.price, 1, 'COMMA', 0, 'POINT') + ' ₫'}"></td>

                            <td class="admin-img-cell">
                                <img th:src="${(food.imageUrl != null and !food.imageUrl.isEmpty()) ? food.imageUrl : '/images/default-food.png'}"
                                    class="food-img-thumb" alt="Food Image" />
                            </td>

                            <td class="col-status">
                                <span th:if="${food.isAvailable}" class="status-badge status-completed">Đang bán</span>
                                <span th:if="${!food.isAvailable}" class="status-badge status-cancelled">Ngừng
                                    bán</span>
                                <span th:if="${food.isAddon}" class="status-badge" style="margin-left:6px;background:#f59e0b;color:#fff;">Món kèm</span>
                            </td>

                            <td class="admin-actions-cell">
                                <button type="button" class="btn btn-small" th:data-id="${food.id}"
                                    th:data-name="${food.name}"
                                    th:data-desc="${food.description}"
                                    th:data-price="${food.price}"
                                    th:data-catid="${food.category != null ? food.category.id : ''}"
                                    th:data-avail="${food.isAvailable}"
                                    th:data-addon="${food.isAddon}"
                                    onclick="openFoodModal(this)">Sửa</button>

                                <form th:action="@{/admin/foods/{id}/delete(id=${food.id})}" method="post"
                                    class="admin-inline-form">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="btn btn-small btn-danger"
                                        onclick="return confirm('Xóa món này?')">Xóa</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="admin-pagination" th:if="${totalPages > 1}">
                <a th:if="${currentPage > 0}"
                   th:href="@{/admin/foods(page=${currentPage - 1}, size=10)}"
                   class="pagination-btn">« Trước</a>
                <span th:if="${currentPage == 0}" class="pagination-btn disabled">« Trước</span>

                <span class="pagination-info">
                    Trang <strong th:text="${currentPage + 1}">1</strong> / <strong th:text="${totalPages}">1</strong>
                </span>

                <a th:if="${currentPage < totalPages - 1}"
                   th:href="@{/admin/foods(page=${currentPage + 1}, size=10)}"
                   class="pagination-btn">Sau »</a>
                <span th:if="${currentPage >= totalPages - 1}" class="pagination-btn disabled">Sau »</span>
            </div>

        </div>
    </main>

    <div id="foodModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Thêm món ăn</h2>
                <span class="close-btn" onclick="closeFoodModal()">&times;</span>
            </div>

            <form th:action="@{/admin/foods/save}" method="post" enctype="multipart/form-data" class="admin-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" id="foodId" name="id" />

                <div class="form-group">
                    <label for="name">Tên món <span class="required">*</span></label>
                    <input type="text" id="name" name="name" required class="form-control" />
                </div>

                <div class="form-group">
                    <label for="description">Mô tả</label>
                    <textarea id="description" name="description" rows="3" class="form-control"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="price">Giá (₫) <span class="required">*</span></label>
                        <input type="number" id="price" name="price" step="1000" min="0" required
                            class="form-control" />
                    </div>
                    <div class="form-group">
                        <label for="categoryId">Danh mục <span class="required">*</span></label>
                        <select id="categoryId" name="categoryId" required class="form-control">
                            <option value="">-- Chọn danh mục --</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="images">Hình ảnh (Chọn để tải lên mới)</label>
                    <input type="file" id="images" name="images" multiple accept="image/*" class="form-control" />
                </div>

                <div class="image-preview-section">
                    <label>Ảnh hiện có / xem trước</label>
                    <div id="imagePreviewGrid" class="image-preview-grid"></div>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="isAvailable" name="isAvailable" value="true" checked />
                    <label for="isAvailable">Đang bán</label>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="isAddon" name="isAddon" value="true" />
                    <label for="isAddon">Món kèm theo </label>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeFoodModal()">Hủy</button>
                    <button type="submit" class="btn btn-primary">Lưu thông tin</button>
                </div>
            </form>
        </div>
    </div>

    <div th:replace="~{layout/footer :: footer}"></div>

    <script>
        const modal = document.getElementById('foodModal');
        const foodForm = modal.querySelector('form');
        const modalTitle = document.getElementById('modalTitle');
        const imagesInput = document.getElementById('images');
        const imagePreviewGrid = document.getElementById('imagePreviewGrid');
        let selectedFoodImageFiles = [];
        let selectedFoodImageUrls = [];
        let existingFoodImages = [];

        function openFoodModal(btn = null) {
            clearImagePreviewState();
            if (btn) {
                // Trường hợp SỬA
                modalTitle.innerText = "Chỉnh sửa món ăn";
                document.getElementById('foodId').value = btn.getAttribute('data-id');
                document.getElementById('name').value = btn.getAttribute('data-name');
                document.getElementById('description').value = btn.getAttribute('data-desc');
                document.getElementById('price').value = btn.getAttribute('data-price');
                document.getElementById('categoryId').value = btn.getAttribute('data-catid');
                document.getElementById('isAvailable').checked = btn.getAttribute('data-avail') === 'true';
                document.getElementById('isAddon').checked = btn.getAttribute('data-addon') === 'true';
                loadFoodImages(btn.getAttribute('data-id'));
            } else {
                // Trường hợp THÊM MỚI
                modalTitle.innerText = "Thêm món mới";
                foodForm.reset();
                document.getElementById('foodId').value = "";
                document.getElementById('isAvailable').checked = true;
                document.getElementById('isAddon').checked = false;
            }
            modal.classList.add('active');
        }

        function closeFoodModal() {
            modal.classList.remove('active');
            clearImagePreviewState();
        }

        function clearImagePreviewState() {
            selectedFoodImageUrls.forEach(url => URL.revokeObjectURL(url));
            selectedFoodImageFiles = [];
            selectedFoodImageUrls = [];
            existingFoodImages = [];
            if (imagesInput) {
                imagesInput.value = '';
            }
            renderImagePreviewGrid();
        }

        function syncFileInputFromSelection() {
            const dataTransfer = new DataTransfer();
            selectedFoodImageFiles.forEach(file => dataTransfer.items.add(file));
            imagesInput.files = dataTransfer.files;
        }

        function renderImagePreviewGrid() {
            if (!imagePreviewGrid) return;

            selectedFoodImageUrls.forEach(url => URL.revokeObjectURL(url));
            selectedFoodImageUrls = [];
            imagePreviewGrid.innerHTML = '';

            existingFoodImages.forEach(image => {
                const item = document.createElement('div');
                item.className = 'image-preview-item';
                item.innerHTML = `
                    <img src="${image.imageUrl}" alt="Ảnh món ăn" />
                    ${image.isMain ? '<span class="image-preview-badge">Ảnh chính</span>' : ''}
                    <button type="button" class="image-preview-remove" aria-label="Xóa ảnh" title="Xóa ảnh">&times;</button>
                `;
                item.querySelector('.image-preview-remove').addEventListener('click', function () {
                    deleteFoodImage(image.id);
                });
                imagePreviewGrid.appendChild(item);
            });

            selectedFoodImageFiles.forEach((file, index) => {
                const objectUrl = URL.createObjectURL(file);
                selectedFoodImageUrls[index] = objectUrl;

                const item = document.createElement('div');
                item.className = 'image-preview-item';
                item.innerHTML = `
                    <img src="${objectUrl}" alt="Ảnh xem trước" />
                    <button type="button" class="image-preview-remove" aria-label="Bỏ ảnh" title="Bỏ ảnh">&times;</button>
                `;
                item.querySelector('.image-preview-remove').addEventListener('click', function () {
                    removeSelectedImage(index);
                });
                imagePreviewGrid.appendChild(item);
            });
        }

        function removeSelectedImage(index) {
            if (selectedFoodImageUrls[index]) {
                URL.revokeObjectURL(selectedFoodImageUrls[index]);
            }
            selectedFoodImageFiles.splice(index, 1);
            selectedFoodImageUrls.splice(index, 1);
            syncFileInputFromSelection();
            renderImagePreviewGrid();
        }

        function loadFoodImages(foodId) {
            existingFoodImages = [];
            if (!foodId) return;

            fetch(`/admin/foods/${foodId}/images`, {
                headers: {
                    'X-CSRF-TOKEN': getAdminCsrfToken()
                }
            })
                .then(response => response.ok ? response.json() : Promise.reject(response.status))
                .then(data => {
                    existingFoodImages = Array.isArray(data) ? data : [];
                    renderImagePreviewGrid();
                })
                .catch(error => {
                    console.error('Failed to load food images:', error);
                    showAdminToast('Không tải được hình ảnh hiện có.', 'error');
                });
        }

        function deleteFoodImage(imageId) {
            if (!imageId) return;
            if (!confirm('Xóa ảnh này?')) return;

            fetch(`/admin/foods/images/${imageId}/delete`, {
                method: 'POST',
                headers: {
                    'X-CSRF-TOKEN': getAdminCsrfToken()
                }
            })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('HTTP ' + response.status);
                    }
                    const foodId = document.getElementById('foodId').value;
                    if (foodId) {
                        refreshFoodImages(foodId);
                    }
                    showAdminToast('Đã xóa hình ảnh.', 'success');
                })
                .catch(error => {
                    console.error('Delete image failed:', error);
                    showAdminToast('Xóa hình ảnh thất bại.', 'error');
                });
        }

        function getAdminCsrfToken() {
            const csrfInput = document.querySelector('input[name="_csrf"]');
            return csrfInput ? csrfInput.value : '';
        }

        function showAdminToast(message, type) {
            const toast = document.createElement('div');
            toast.className = 'site-toast ' + (type === 'success' ? 'success' : 'error');
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.classList.add('visible'), 10);
            setTimeout(() => toast.classList.remove('visible'), 3500);
            setTimeout(() => toast.remove(), 3900);
        }

        function refreshFoodImages(foodId) {
            if (!foodId) return;

            fetch(`/admin/foods/${foodId}/images`, {
                headers: {
                    'X-CSRF-TOKEN': getAdminCsrfToken()
                }
            })
                .then(response => response.ok ? response.json() : Promise.reject(response.status))
                .then(data => {
                    existingFoodImages = Array.isArray(data) ? data : [];
                    renderImagePreviewGrid();
                })
                .catch(error => {
                    console.error('Failed to refresh food images:', error);
                });
        }

        imagesInput.addEventListener('change', function () {
            selectedFoodImageFiles = Array.from(this.files || []);
            selectedFoodImageUrls.forEach(url => URL.revokeObjectURL(url));
            selectedFoodImageUrls = [];
            renderImagePreviewGrid();
        });

        // Đóng khi click ngoài vùng modal
        window.addEventListener('click', function (event) {
            if (event.target === modal) closeFoodModal();
        });
    </script>
</body>

</html>
