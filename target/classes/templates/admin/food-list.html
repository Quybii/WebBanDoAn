<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý món ăn - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/admin.css}" />
</head>

<body>
    <div th:replace="~{layout/admin-header :: admin-header}"></div>

    <main class="admin-main">
        <div class="container">
            <div class="admin-page-header">
                <h1 class="admin-page-title">Quản lý món ăn</h1>
                <button type="button" class="btn btn-primary" onclick="openFoodModal()">Thêm món mới</button>
            </div>

            <p th:if="${successMessage}" class="admin-message success" th:text="${successMessage}"></p>
            <p th:if="${errorMessage}" class="admin-message error" th:text="${errorMessage}"></p>

            <div class="admin-table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th class="col-id">ID</th>
                            <th class="col-name">Tên món</th>
                            <th class="col-category">Danh mục</th>
                            <th class="col-price">Giá</th>
                            <th class="admin-img-cell">Hình ảnh</th>
                            <th class="col-status">Trạng thái</th>
                            <th class="admin-actions-cell">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="food : ${foods}">
                            <td class="col-id" th:text="${food.id}">1</td>
                            <td class="col-name" th:text="${food.name}">Tên món</td>
                            <td class="col-category"
                                th:text="${food.category != null ? food.category.name : 'Chưa gắn danh mục'}">Danh mục</td>
                            <td class="col-price"
                                th:text="${#numbers.formatDecimal(food.price, 1, 'COMMA', 0, 'POINT') + ' ₫'}"></td>

                            <td class="admin-img-cell">
                                <img th:src="${(food.imageUrl != null and !food.imageUrl.isEmpty()) ? food.imageUrl : '/images/default-food.png'}"
                                    class="food-img-thumb" alt="Food Image" />
                            </td>

                            <td class="col-status">
                                <span th:if="${food.isAvailable}" class="status-badge status-completed">Đang bán</span>
                                <span th:if="${!food.isAvailable}" class="status-badge status-cancelled">Ngừng
                                    bán</span>
                            </td>

                            <td class="admin-actions-cell">
                                <button type="button" class="btn btn-small" th:data-id="${food.id}"
                                    th:data-name="${food.name}" onclick="openFoodModal(this)">Sửa</button>

                                <form th:action="@{/admin/foods/{id}/delete(id=${food.id})}" method="post"
                                    class="admin-inline-form">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="btn btn-small btn-danger"
                                        onclick="return confirm('Xóa món này?')">Xóa</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="foodModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Thêm món ăn</h2>
                <span class="close-btn" onclick="closeFoodModal()">&times;</span>
            </div>

            <form th:action="@{/admin/foods/save}" method="post" enctype="multipart/form-data" class="admin-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" id="foodId" name="id" />

                <div class="form-group">
                    <label for="name">Tên món <span class="required">*</span></label>
                    <input type="text" id="name" name="name" required class="form-control" />
                </div>

                <div class="form-group">
                    <label for="description">Mô tả</label>
                    <textarea id="description" name="description" rows="3" class="form-control"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="price">Giá (₫) <span class="required">*</span></label>
                        <input type="number" id="price" name="price" step="1000" min="0" required
                            class="form-control" />
                    </div>
                    <div class="form-group">
                        <label for="categoryId">Danh mục <span class="required">*</span></label>
                        <select id="categoryId" name="categoryId" required class="form-control">
                            <option value="">-- Chọn danh mục --</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="images">Hình ảnh (Chọn để tải lên mới)</label>
                    <input type="file" id="images" name="images" multiple accept="image/*" class="form-control" />
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="isAvailable" name="isAvailable" value="true" checked />
                    <label for="isAvailable">Đang bán</label>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeFoodModal()">Hủy</button>
                    <button type="submit" class="btn btn-primary">Lưu thông tin</button>
                </div>
            </form>
        </div>
    </div>

    <div th:replace="~{layout/footer :: footer}"></div>

    <script>
        const modal = document.getElementById('foodModal');
        const foodForm = modal.querySelector('form');
        const modalTitle = document.getElementById('modalTitle');

        function openFoodModal(btn = null) {
            if (btn) {
                // Trường hợp SỬA
                modalTitle.innerText = "Chỉnh sửa món ăn";
                document.getElementById('foodId').value = btn.getAttribute('data-id');
                document.getElementById('name').value = btn.getAttribute('data-name');
                document.getElementById('description').value = btn.getAttribute('data-desc');
                document.getElementById('price').value = btn.getAttribute('data-price');
                document.getElementById('categoryId').value = btn.getAttribute('data-catid');
                document.getElementById('isAvailable').checked = btn.getAttribute('data-avail') === 'true';
            } else {
                // Trường hợp THÊM MỚI
                modalTitle.innerText = "Thêm món mới";
                foodForm.reset();
                document.getElementById('foodId').value = "";
            }
            modal.classList.add('active');
        }

        function closeFoodModal() {
            modal.classList.remove('active');
        }

        // Đóng khi click ngoài vùng modal
        window.onclick = function (event) {
            if (event.target == modal) closeFoodModal();
        }
    </script>
</body>

</html>
