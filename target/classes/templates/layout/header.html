<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><title>Header</title></head>
<body>
<!-- Fragment: thanh header dùng chung cho mọi trang -->
<header class="site-header" th:fragment="header">
    <div class="container header-inner">
        <a th:href="@{/}" class="logo">WebBanDoAn</a>
        <nav class="main-nav">
            <a th:href="@{/}" class="nav-link">Trang chủ</a>
            <a th:href="@{/foods}" class="nav-link">Danh sách món</a>

            <a th:href="@{/cart}" class="nav-cart nav-link">
                <span class="cart-icon">🛒</span>
                <span class="cart-label">Giỏ hàng</span>
                <span class="cart-count" id="header-cart-count" th:text="${cartCount}">0</span>
            </a>

            <div th:if="${isAdmin}" class="nav-admin">
                <a th:href="@{/admin}" class="btn-admin">Admin</a>
                <div class="admin-menu">
                    <a th:href="@{/admin}">Dashboard</a>
                    <a th:href="@{/admin/foods}">Quản lý món</a>
                    <a th:href="@{/admin/orders}">Quản lý đơn</a>
                </div>
            </div>

            <div th:if="${isAuthenticated}" class="nav-user">
                <button class="user-btn" type="button">
                    <span class="user-badge" th:attr="data-initial=${#strings.substring(currentUsername,0,1).toUpperCase()}"></span>
                    <span class="user-name" th:text="${currentUsername}">User</span>
                </button>
                <div class="user-menu">
                    <a th:href="@{/profile}">Hồ sơ</a>
                    <a th:href="@{/orders}">Đơn hàng của tôi</a>
                    <form th:action="@{/logout}" method="post" class="logout-form">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="logout-btn">Đăng xuất</button>
                    </form>
                </div>
            </div>

            <a th:if="${!isAuthenticated}" th:href="@{/login}" class="nav-link btn-login">Đăng nhập</a>
        </nav>
        <script th:inline="javascript">
            /*<![CDATA[*/
            // Expose CSRF to JS
            window._csrf = {
                headerName: /*[[${_csrf.headerName}]]*/ 'X-CSRF-TOKEN',
                token: /*[[${_csrf.token}]]*/ ''
            };
            /*]]>*/
        </script>
        <script th:src="@{/js/cart.js}"></script>
        <script th:src="@{/js/header-menu.js}"></script>
    </div>
</header>
</body>
</html>
