<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng nhập - WebBanDoAn</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/css/auth.css}"/>
</head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<main class="main-content">
    <div class="container auth-container">
        <div class="auth-box">
            <h1 class="auth-title">Đăng nhập</h1>

            <p th:if="${errorMessage}" class="auth-error" th:text="${errorMessage}">Sai tên đăng nhập hoặc mật khẩu.</p>
            <p th:if="${successMessage}" class="auth-success" th:text="${successMessage}">Đăng ký thành công.</p>

            <form th:action="@{/login}" method="post" class="auth-form">

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>

                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" name="username" required autofocus
                           placeholder="Nhập tên đăng nhập" class="form-control"/>
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" required
                           placeholder="Nhập mật khẩu" class="form-control"/>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Đăng nhập</button>
            </form>
            

            <p class="auth-footer">
                Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a>
            </p>
        </div>
    </div>
</main>

<!-- <div th:replace="~{layout/footer :: footer}"></div> -->

</body>
</html>
