<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Giỏ hàng - WebBanDoAn</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/css/cart.css}"/>
</head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<main class="main-content">
    <div class="container">
        <h1 class="page-title">Giỏ hàng</h1>

        <p th:if="${successMessage}" class="cart-message success" th:text="${successMessage}">Đã cập nhật.</p>

        <div th:if="${cartItems != null and !cartItems.isEmpty()}" class="cart-content">
            <table class="cart-table">
                <thead>
                    <tr>
                        <th>Món ăn</th>
                        <th>Đơn giá</th>
                        <th>Số lượng</th>
                        <th>Thành tiền</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${cartItems}">
                        <td class="cart-item-name">
                            <a th:href="@{/foods/{id}(id=${item.food.id})}" th:text="${item.food.name}">Tên món</a>
                        </td>
                        <td class="cart-item-price" th:text="${#numbers.formatDecimal(item.food.price, 1, 'COMMA', 0, 'POINT') + ' ₫'}">35.000 ₫</td>
                        <td class="cart-item-qty">
                            <div class="qty-control">
                                <button type="button" class="qty-btn qty-minus" th:data-cart-id="${item.id}">−</button>
                                <span class="qty-display" th:text="${item.quantity}">1</span>
                                <button type="button" class="qty-btn qty-plus" th:data-cart-id="${item.id}">+</button>
                            </div>
                        </td>
                        <td class="cart-item-subtotal" th:text="${#numbers.formatDecimal(item.subtotal, 1, 'COMMA', 0, 'POINT') + ' ₫'}">70.000 ₫</td>
                        <td class="cart-item-remove">
                            <form th:action="@{/cart/remove/{id}(id=${item.id})}" method="post" class="cart-remove-form">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-small btn-danger">Xóa</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="cart-summary">
                <p class="cart-total">
                    <strong>Tổng cộng:</strong>
                    <span class="total-amount" th:text="${#numbers.formatDecimal(totalAmount, 1, 'COMMA', 0, 'POINT') + ' ₫'}">0 ₫</span>
                </p>
                <div class="cart-actions">
                    <a th:href="@{/foods}" class="btn btn-secondary">Tiếp tục mua</a>
                    <a th:href="@{/checkout}" class="btn btn-primary">Đặt hàng</a>
                </div>
            </div>
        </div>

        <div th:if="${cartItems == null or cartItems.isEmpty()}" class="cart-empty">
            <p>Giỏ hàng trống.</p>
            <a th:href="@{/foods}" class="btn btn-primary">Xem danh sách món</a>
        </div>
    </div>
</main>

<!-- Custom Confirm Modal (Thêm mới) -->
<div id="custom-confirm-modal" class="modal-overlay">
    <div class="modal-box">
        <h3 style="margin-top: 0; color: var(--secondary);">Xác nhận</h3>
        <p>Bạn có chắc chắn muốn xóa món này khỏi giỏ hàng không?</p>
        <div class="modal-actions">
            <button id="btn-modal-cancel" class="btn" style="background: #6c757d; color: var(--white);">Hủy</button>
            <button id="btn-modal-confirm" class="btn btn-danger" style="background: #dc3545; color: var(--white);">Xóa ngay</button>
        </div>
    </div>
</div>

<div th:replace="~{layout/footer :: footer}"></div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Xử lý nút + và -
    document.querySelectorAll('.qty-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            const cartId = this.getAttribute('data-cart-id');
            const row = this.closest('tr');
            const qtyDisplay = row.querySelector('.qty-display');
            let currentQty = parseInt(qtyDisplay.textContent);
            
            if (this.classList.contains('qty-minus')) {
                if (currentQty > 1) {
                    currentQty--;
                    updateQuantity(cartId, currentQty);
                }
            } else if (this.classList.contains('qty-plus')) {
                if (currentQty < 99) {
                    currentQty++;
                    updateQuantity(cartId, currentQty);
                }
            }
        });
    });
    
    // ==========================================
    // Xử lý Custom Modal cho nút xóa (Đã cập nhật)
    // ==========================================
    const modal = document.getElementById('custom-confirm-modal');
    const btnCancel = document.getElementById('btn-modal-cancel');
    const btnConfirm = document.getElementById('btn-modal-confirm');
    let itemToRemoveId = null; // Biến lưu ID của món cần xóa

    // Bắt sự kiện khi form xóa được submit
    document.querySelectorAll('.cart-remove-form').forEach(form => {
        form.addEventListener('submit', function(e) {
            e.preventDefault(); // Chặn load lại trang
            
            // Lấy ID giỏ hàng từ nút cộng/trừ cùng hàng
            itemToRemoveId = this.closest('tr').querySelector('.qty-btn').getAttribute('data-cart-id');
            
            // Hiện Modal
            if (modal) modal.classList.add('active');
        });
    });

    // Khi bấm nút "Hủy" trong Modal
    if (btnCancel) {
        btnCancel.addEventListener('click', function() {
            if (modal) modal.classList.remove('active');
            itemToRemoveId = null;
        });
    }

    // Khi bấm nút "Xóa ngay" trong Modal
    if (btnConfirm) {
        btnConfirm.addEventListener('click', function() {
            if (itemToRemoveId) {
                removeItem(itemToRemoveId); // Gọi hàm AJAX xóa ở bên dưới
            }
            if (modal) modal.classList.remove('active');
        });
    }
    // ==========================================
    
    // Các hàm AJAX bên dưới giữ nguyên 100% của bạn
    function updateQuantity(cartId, newQuantity) {
        const payload = {
            cartItemId: cartId,
            quantity: newQuantity
        };
        
        const headers = {
            'Content-Type': 'application/json'
        };
        
        // Add CSRF token if available
        if (window._csrf && window._csrf.headerName && window._csrf.token) {
            headers[window._csrf.headerName] = window._csrf.token;
        }
        
        fetch('/cart/api/update', {
            method: 'POST',
            headers: headers,
            body: JSON.stringify(payload),
            credentials: 'same-origin'
        })
        .then(response => {
            console.log('Update Response status:', response.status);
            return response.json();
        })
        .then(data => {
            console.log('Update Response:', data);
            if (data.success) {
                updateCartDisplay(data);
            } else {
                alert('Lỗi: ' + data.message);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Lỗi khi cập nhật: ' + error.message);
        });
    }
    
    function removeItem(cartId) {
        const headers = {
            'Content-Type': 'application/json'
        };
        
        // Add CSRF token if available
        if (window._csrf && window._csrf.headerName && window._csrf.token) {
            headers[window._csrf.headerName] = window._csrf.token;
        }
        
        fetch('/cart/api/remove/' + cartId, {
            method: 'POST',
            headers: headers,
            credentials: 'same-origin'
        })
        .then(response => {
            console.log('Remove Response status:', response.status);
            return response.json();
        })
        .then(data => {
            console.log('Remove Response:', data);
            if (data.success) {
                // Xóa dòng khỏi bảng
                const row = document.querySelector(`button[data-cart-id="${cartId}"]`).closest('tr');
                row.style.opacity = '0.5';
                setTimeout(() => {
                    row.remove();
                    updateCartDisplay(data);
                    // Kiểm tra nếu giỏ trống
                    if (data.cartCount === 0) {
                        location.reload();
                    }
                }, 300);
            } else {
                alert('Lỗi: ' + data.message);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Lỗi khi xóa: ' + error.message);
        });
    }
    
    function updateCartDisplay(data) {
        if (data.items && data.items.length > 0) {
            // Cập nhật từng dòng
            data.items.forEach(item => {
                const btn = document.querySelector(`button[data-cart-id="${item.id}"]`);
                if (btn) {
                    const row = btn.closest('tr');
                    // Cập nhật số lượng
                    row.querySelector('.qty-display').textContent = item.quantity;
                    // Cập nhật thành tiền
                    const subsTotal = (item.subtotal || (item.price * item.quantity));
                    row.querySelector('.cart-item-subtotal').textContent = 
                        formatCurrency(subsTotal) + ' ₫';
                }
            });
        }
        
        // Cập nhật tổng cộng
        const totalElement = document.querySelector('.total-amount');
        if (totalElement) {
            totalElement.textContent = formatCurrency(data.totalAmount) + ' ₫';
        }
        // CẬP NHẬT SỐ LƯỢNG TRÊN HEADER
        if (data.cartCount !== undefined) {
            const headerCartCount = document.getElementById('header-cart-count');
            if (headerCartCount) {
                headerCartCount.textContent = data.cartCount;
            }
        }
    }
    
    function formatCurrency(value) {
        return new Intl.NumberFormat('vi-VN', {
            minimumFractionDigits: 0,
            maximumFractionDigits: 0
        }).format(value);
    }
});
</script>

</body>
</html>
