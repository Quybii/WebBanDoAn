<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đặt hàng thành công - WebBanDoAn</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/css/auth.css}"/>
</head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<main class="main-content">
    <div class="container">
        <div class="order-success-box" th:if="${order != null}">
            <h1 class="order-success-title">Đặt hàng thành công!</h1>
            <p class="order-success-message">Cảm ơn bạn đã đặt hàng. Chúng tôi sẽ liên hệ sớm để xác nhận và giao hàng.</p>
            <p class="order-success-id">
                Mã đơn hàng: <strong th:text="${order.id}">1</strong>
            </p>
            <p class="order-success-total">
                Tổng tiền: <strong th:text="${#numbers.formatDecimal(order.totalAmount, 1, 'COMMA', 0, 'POINT') + ' ₫'}">0 ₫</strong>
            </p>
            <div class="order-success-actions">
                <a th:href="@{/orders}" class="btn btn-primary">Xem đơn hàng của tôi</a>
                <a th:href="@{/}" class="btn btn-secondary">Về trang chủ</a>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
