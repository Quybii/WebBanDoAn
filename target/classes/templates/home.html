<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>WebBanDoAn - Trang chủ</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/css/home.css}"/>
</head>
<body>
<div th:replace="~{layout/header :: header}"></div>

<main class="main-content">
    <div class="container">
        <!-- Hero / Banner -->
        <section class="hero">
            <h1>Chào mừng đến WebBanDoAn</h1>
            <p>Đặt món nhanh, giao tận nơi – Đồ ăn ngon mỗi ngày.</p>
        </section>

        <!-- Danh mục -->
        <section class="section categories-section">
            <h2 class="section-title">Danh mục món ăn</h2>
            <div class="category-list" th:if="${categories != null and !categories.isEmpty()}">
                <a th:each="cat : ${categories}"
                   th:href="@{/foods(categoryId=${cat.id})}"
                   class="category-card"
                   th:text="${cat.name}">Cơm</a>
            </div>
            <p th:if="${categories == null or categories.isEmpty()}" class="empty-msg">Chưa có danh mục.</p>
        </section>

        <!-- Món nổi bật -->
        <section class="section featured-section">
            <h2 class="section-title">Món nổi bật</h2>
            <div class="food-grid" th:if="${featuredFoods != null and !featuredFoods.isEmpty()}">
                <div th:each="food : ${featuredFoods}" class="food-card">
                    <a th:href="@{/foods/{id}(id=${food.id})}" class="food-card-link">
                        <div class="food-card-image">
                            <img th:if="${food.imageUrl != null and !food.imageUrl.isEmpty()}"
                                 th:src="${food.imageUrl}" th:alt="${food.name}"/>
                            <div th:if="${food.imageUrl == null or food.imageUrl.isEmpty()}" class="food-card-placeholder">
                                <span>🍽</span>
                            </div>
                        </div>
                        <div class="food-card-body">
                            <h3 class="food-card-title" th:text="${food.name}">Tên món</h3>
                            <p class="food-card-desc" th:text="${food.description != null ? #strings.abbreviate(food.description, 60) : '(Chưa có mô tả)'}">Mô tả ngắn</p>
                            <p class="food-card-price" th:text="${#numbers.formatDecimal(food.price, 1, 'COMMA', 0, 'POINT') + ' ₫'}">35.000 ₫</p>
                        </div>
                    </a>
                    <a th:href="@{/foods/{id}(id=${food.id})}" class="btn btn-add-cart">Xem chi tiết</a>
                </div>
            </div>
            <p th:if="${featuredFoods == null or featuredFoods.isEmpty()}" class="empty-msg">Chưa có món nổi bật.</p>
            <p class="section-more">
                <a th:href="@{/foods}" class="btn btn-primary">Xem tất cả món</a>
            </p>
        </section>
    </div>
</main>

<div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
