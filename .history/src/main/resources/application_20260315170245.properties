# =====================================================
# WebBanDoAn - Cấu hình ứng dụng
# =====================================================

# --- Server ---
server.port=8080
server.servlet.context-path=/

# --- SQL Server (đổi theo máy bạn: server name, database, user, password) ---
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=WebBanDoAn;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# --- Thymeleaf ---
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# --- Upload file (ảnh món, ảnh danh mục) - tùy chọn ---
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# --- Logging ---
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
